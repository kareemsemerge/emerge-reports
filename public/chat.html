<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerge · Live Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1b2a;
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .chat-wrap {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    height: 90vh;
    max-height: 640px;
  }
  .chat-header {
    background: #1a2e45;
    border: 1px solid rgba(201,168,76,0.2);
    border-bottom: none;
    border-radius: 14px 14px 0 0;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pulse {
    width: 10px; height: 10px; border-radius: 50%;
    background: #4ade9a;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .chat-header-text h2 { font-size: 15px; font-weight: 700; }
  .chat-header-text p { font-size: 12px; color: #8a9bb0; margin-top: 2px; }
  .name-bar {
    background: #132030;
    border-left: 1px solid rgba(201,168,76,0.2);
    border-right: 1px solid rgba(201,168,76,0.2);
    padding: 0.6rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #8a9bb0;
  }
  .name-bar input {
    background: none;
    border: none;
    color: #c9a84c;
    font-size: 13px;
    font-weight: 600;
    outline: none;
    width: 140px;
  }
  .name-bar input::placeholder { color: #4a6080; }
  .messages {
    flex: 1;
    overflow-y: auto;
    background: #0d1b2a;
    border-left: 1px solid rgba(201,168,76,0.2);
    border-right: 1px solid rgba(201,168,76,0.2);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }
  .msg { display: flex; flex-direction: column; max-width: 80%; }
  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; align-items: flex-start; }
  .msg-name { font-size: 11px; color: #8a9bb0; margin-bottom: 3px; padding: 0 6px; }
  .msg-bubble {
    padding: 0.6rem 0.9rem;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.mine .msg-bubble {
    background: #c9a84c; color: #0d1b2a;
    border-radius: 12px 12px 2px 12px;
  }
  .msg.theirs .msg-bubble {
    background: #1a2e45; color: #fff;
    border-radius: 12px 12px 12px 2px;
  }
  .msg-time { font-size: 10px; color: #4a6080; margin-top: 3px; padding: 0 6px; }
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #4a6080; font-size: 14px; text-align: center; gap: 0.5rem;
  }
  .sync-indicator {
    font-size: 11px; color: #4a6080; text-align: center; padding: 4px;
    background: #0d1b2a;
    border-left: 1px solid rgba(201,168,76,0.2);
    border-right: 1px solid rgba(201,168,76,0.2);
  }
  .input-bar {
    background: #1a2e45;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 0 0 14px 14px;
    padding: 0.75rem 1rem;
    display: flex; gap: 8px; align-items: center;
  }
  .msg-input {
    flex: 1; background: #0d1b2a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 0.6rem 0.9rem;
    color: #fff; font-size: 14px; outline: none;
  }
  .msg-input:focus { border-color: rgba(201,168,76,0.4); }
  .msg-input::placeholder { color: #4a6080; }
  .send-btn {
    background: #c9a84c; border: none; border-radius: 8px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .send-btn:hover { background: #e8c96a; }
  .share-bar {
    background: #132030;
    border: 1px solid rgba(201,168,76,0.2);
    border-top: none;
    padding: 0.5rem 1.25rem;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #8a9bb0;
  }
  .share-url {
    flex: 1; background: none; border: none;
    color: #c9a84c; font-size: 11px; font-family: monospace;
    outline: none; cursor: pointer; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .copy-btn {
    background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
    color: #c9a84c; border-radius: 5px; padding: 3px 8px;
    font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .copy-btn:hover { background: rgba(201,168,76,0.25); }
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-header">
    <div class="pulse"></div>
    <div class="chat-header-text">
      <h2>Emerge Live Chat</h2>
      <p>Auto-syncs every 3 seconds</p>
    </div>
  </div>

  <div class="name-bar">
    Your name:
    <input type="text" id="username" placeholder="Enter your name…" maxlength="20"/>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty">
      <p>No messages yet.<br>Be the first to say something.</p>
    </div>
  </div>

  <div class="sync-indicator" id="sync">Connecting…</div>

  <div class="share-bar">
    Share:
    <input class="share-url" id="share-url" readonly/>
    <button class="copy-btn" onclick="copyLink()">Copy link</button>
  </div>

  <div class="input-bar">
    <input class="msg-input" id="msg-input" placeholder="Type a message…" maxlength="500"/>
    <button class="send-btn" id="send-btn">
      <svg viewBox="0 0 18 18" fill="none" width="18" height="18">
        <path d="M2 9l14-7-7 14V9H2z" fill="#0d1b2a"/>
      </svg>
    </button>
  </div>
</div>

<script>
const roomId = window.location.pathname.split('/').pop();
const BASE = window.location.origin;
let lastCount = 0;
let polling = null;

document.getElementById('share-url').value = window.location.href;

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  document.querySelector('.copy-btn').textContent = 'Copied!';
  setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy link', 2000);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(ts) {
  return new Date(ts).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty');
  const myName = document.getElementById('username').value.trim();

  if (!messages.length) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  if (messages.length === lastCount) return;

  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
  lastCount = messages.length;

  container.innerHTML = messages.map(m => {
    const mine = m.name === myName;
    return `<div class="msg ${mine ? 'mine' : 'theirs'}">
      <div class="msg-name">${esc(m.name)}</div>
      <div class="msg-bubble">${esc(m.text)}</div>
      <div class="msg-time">${fmt(m.ts)}</div>
    </div>`;
  }).join('');

  if (atBottom) container.scrollTop = container.scrollHeight;
}

async function fetchMessages() {
  try {
    const r = await fetch(`${BASE}/api/chat/${roomId}/messages`);
    const d = await r.json();
    if (d.ok) {
      renderMessages(d.messages);
      document.getElementById('sync').textContent = '● Live — syncs every 3s';
    }
  } catch(e) {
    document.getElementById('sync').textContent = '⚠ Connection issue — retrying…';
  }
}

function startPolling() {
  fetchMessages();
  polling = setInterval(fetchMessages, 3000);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const name = document.getElementById('username').value.trim() || 'Anonymous';
  if (!text) return;

  input.value = '';
  input.disabled = true;

  try {
    await fetch(`${BASE}/api/chat/${roomId}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, text })
    });
    await fetchMessages();
  } catch(e) {
    document.getElementById('sync').textContent = '⚠ Send failed';
  } finally {
    input.disabled = false;
    input.focus();
  }
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

startPolling();
</script>
</body>
</html>
