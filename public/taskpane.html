<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerge Reports</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0B1D2E;
    color: #E8ECF0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #0B1D2E;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(45,140,210,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
  }
  .header-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .session-list {
    padding: 12px;
    overflow-y: auto;
    flex-shrink: 0;
    max-height: 200px;
    border-bottom: 1px solid rgba(45,140,210,0.15);
  }
  .session-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
  }
  .session-item:hover { background: rgba(45,140,210,0.15); }
  .session-item.active { background: rgba(45,140,210,0.25); }
  .session-name {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
  }
  .session-date {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }
  .session-arrow {
    color: #2D8CD2;
    font-size: 14px;
  }
  .report-frame {
    flex: 1;
    width: 100%;
    border: none;
    background: #0B1D2E;
  }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .empty-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .empty-text {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
  }
  .loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }
  .no-sessions {
    padding: 16px;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Emerge Living</div>
    <div class="header-sub">Interactive Reports</div>
  </div>
</div>

<div class="session-list" id="sessionList">
  <div class="loading">Loading reports…</div>
</div>

<iframe class="report-frame" id="reportFrame" style="display:none;"></iframe>

<div class="empty-state" id="emptyState">
  <div class="empty-icon">📊</div>
  <div class="empty-text">Select a report above to view it here inside Outlook</div>
</div>

<script>
Office.onReady(function() {
  loadSessions();
});

async function loadSessions() {
  try {
    const res = await fetch('https://emerge-reports.onrender.com/api/sessions');
    const { sessions } = await res.json();
    const list = document.getElementById('sessionList');

    if (!sessions || sessions.length === 0) {
      list.innerHTML = '<div class="no-sessions">No reports available yet.</div>';
      return;
    }

    const sorted = sessions.slice().reverse();
    list.innerHTML = sorted.map(s => `
      <div class="session-item" onclick="loadReport('${s.id}', this)">
        <div>
          <div class="session-name">${s.label}</div>
          <div class="session-date">${new Date(s.createdAt).toLocaleDateString()}</div>
        </div>
        <div class="session-arrow">›</div>
      </div>
    `).join('');

    // Auto-load the most recent report
    const first = list.querySelector('.session-item');
    if (first) first.click();

  } catch(err) {
    document.getElementById('sessionList').innerHTML =
      '<div class="no-sessions">Could not load reports.</div>';
  }
}

function loadReport(sessionId, el) {
  document.querySelectorAll('.session-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');

  const frame = document.getElementById('reportFrame');
  const empty = document.getElementById('emptyState');

  frame.style.display = 'block';
  empty.style.display = 'none';
  frame.src = `https://emerge-reports.onrender.com/session/${sessionId}`;
}
</script>
</body>
</html>
